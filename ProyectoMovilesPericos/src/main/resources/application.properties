# =============================================
# Servidor
# =============================================
server.port=8080

# =============================================
# Base de datos H2 (en memoria)
# =============================================
spring.datasource.url=jdbc:h2:mem:movilesdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2 accesible en http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# =============================================
# JWT
# =============================================
jwt.secret=clave-super-secreta-moviles-api-2026-segura
jwt.expiration-ms=86400000

# =============================================
# Logging
# =============================================
logging.level.org.springframework.security=DEBUG
logging.level.com.example.moviles=DEBUG