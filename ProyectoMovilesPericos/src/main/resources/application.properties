# =============================================
# Servidor
# =============================================
server.port=8080

# =============================================
# Base de datos MySQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/pericosdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# =============================================
# JWT
# =============================================
jwt.secret=clave-super-secreta-moviles-api-2024-segura
jwt.expiration-ms=86400000

# =============================================
# Logging
# =============================================
logging.level.org.springframework.security=DEBUG
logging.level.com.example.moviles=DEBUG